schema = "sim.features"

[enforcement.audience]
code = "strict"
framework = "strict"

[enforcement.specimen]
user = "strict"
framework = "strict"
code = "advisory"

[enforcement.route]
major_entrypoints = "advisory"
frameworks = "advisory"

[[feature]]
id = "feature/sim-discrete/generated-docs"
title = "Repository documentation surface"
summary = "Publish generated package, card, rustdoc, and index facts for the discrete algebra crates."
owner = "crate/xtask"
audiences = ["code"]
guidance = "Use this row when checking the generated documentation and index lane for discrete algebra."
claims_anchors = [
  "anchor/cli/xtask",
  "anchor/crate/xtask",
  "anchor/doc/generated/card-index",
  "anchor/doc/generated/feature-map",
  "anchor/doc/generated/provenance",
  "anchor/doc/generated/repo-contract",
  "anchor/doc/generated/rustdoc-index",
  "anchor/doc/generated/sim-index-fragment",
  "anchor/repo/sim-discrete",
]
claims_surfaces = [
  "cli/xtask",
  "docs/sim-discrete/generated",
]

[[feature]]
id = "feature/sim-discrete/discrete-algebra"
title = "Discrete algebra domain"
summary = "Provide algebra, graph, combinatorics, ranking, and spectral helpers as one reusable discrete-domain stack."
owner = "crate/sim-lib-discrete"
audiences = ["code", "framework"]
guidance = "Use this row when selecting a reusable discrete mathematics representation or graph helper."
claims_anchors = [
  "anchor/crate/sim-lib-discrete",
  "anchor/crate/sim-lib-discrete-algebra",
  "anchor/crate/sim-lib-discrete-comb",
  "anchor/crate/sim-lib-discrete-graph",
  "anchor/crate/sim-lib-discrete-rank",
  "anchor/crate/sim-lib-discrete-search",
  "anchor/crate/sim-lib-discrete-spectral",
  "anchor/runtime-lib/sim-lib-discrete/discrete-lib",
]
claims_specimens = [
  "spec-test/sim-discrete/crates/sim-lib-discrete/src/forms",
]

[[feature]]
id = "feature/sim-discrete/finite-enumeration"
title = "Finite enumeration adapters"
summary = "Enumerate fixed-alphabet words lazily, adapt words to mixed-radix digits, canonicalize cyclic patterns, and keep longest candidates."
owner = "crate/sim-lib-discrete-comb"
audiences = ["code", "framework"]
guidance = "Use this row when a finite catalog needs exact counts, rank/unrank identities, lazy prefix enumeration, cyclic pattern representatives, or longest-only filtering."
claims_anchors = [
  "anchor/card/cookbook/discrete-comb",
  "anchor/crate/sim-lib-discrete-comb",
  "anchor/rustdoc/sim-lib-discrete-comb/canonical_cycles",
  "anchor/rustdoc/sim-lib-discrete-comb/digits_to_word",
  "anchor/rustdoc/sim-lib-discrete-comb/longest_only",
  "anchor/rustdoc/sim-lib-discrete-comb/mixed-radix-words",
  "anchor/rustdoc/sim-lib-discrete-comb/word",
  "anchor/rustdoc/sim-lib-discrete-comb/word_count",
  "anchor/rustdoc/sim-lib-discrete-comb/word_radices",
  "anchor/rustdoc/sim-lib-discrete-comb/word_rank",
  "anchor/rustdoc/sim-lib-discrete-comb/word_to_digits",
  "anchor/rustdoc/sim-lib-discrete-comb/word_unrank",
  "anchor/rustdoc/sim-lib-discrete-comb/words",
]
claims_specimens = [
  "spec-test/sim-discrete/crates/sim-lib-discrete-comb/src/word",
]

[[feature]]
id = "feature/sim-discrete/bounded-search"
title = "Bounded deterministic search"
summary = "Search finite state spaces with deterministic order, explicit work charging, bounds, cancellation, pruning, propagation, and receipts."
owner = "crate/sim-lib-discrete-search"
audiences = ["code", "framework"]
guidance = "Use this row when a domain needs bounded prefix search, branch-and-bound, beam, A-star, CSP propagation, a two-stack adapter, or reproducible partial-result receipts."
claims_anchors = [
  "anchor/card/cookbook/discrete-search",
  "anchor/crate/sim-lib-discrete-search",
  "anchor/rustdoc/sim-lib-discrete-search/constrained-word-problem",
  "anchor/rustdoc/sim-lib-discrete-search/search-control",
  "anchor/rustdoc/sim-lib-discrete-search/search-problem",
  "anchor/rustdoc/sim-lib-discrete-search/search-receipt",
  "anchor/rustdoc/sim-lib-discrete-search/solve",
  "anchor/rustdoc/sim-lib-discrete-search/two-stack-adapter",
]
claims_specimens = [
  "spec-test/sim-discrete/crates/sim-lib-discrete-search/src/cookbook",
]

[[route]]
id = "route/add-discrete-domain-helper"
task = "Add a discrete domain helper"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-discrete/discrete-algebra", why = "The discrete row owns algebra, graph, ranking, and spectral helpers." },
]

[[route]]
id = "route/add-finite-enumeration-adapter"
task = "Add a finite enumeration adapter"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-discrete/discrete-algebra", why = "The discrete stack owns combinatorics and rank integration." },
  { feature = "feature/sim-discrete/finite-enumeration", why = "The finite enumeration row owns lazy words, digit/radix adapters, cyclic canonicalization, and longest-only selection." },
]

[[route]]
id = "route/add-bounded-search-engine"
task = "Add a bounded search engine"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-discrete/discrete-algebra", why = "The discrete stack owns reusable algorithmic helpers." },
  { feature = "feature/sim-discrete/bounded-search", why = "The bounded-search row owns deterministic state-space search policy, bounds, receipts, and specimens." },
]
